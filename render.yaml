services:
  - type: web
    name: sektor-rehberim
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_DATA_DIR
        value: /var/data
      - key: SQLITE_PATH
        value: /var/data/app.db
    disk:
      name: sektor-rehberim-data
      mountPath: /var/data
      sizeGB: 1
